version: "3.8"

services:
  fbleadbot:
    build: .
    container_name: fbleadbot
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
      - ./logs:/app/logs
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - SCHEDULER_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
